version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: goodsie-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: goodsie-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
